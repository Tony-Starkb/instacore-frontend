<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log in — InstaCore</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="nav-placeholder"></div>

<div class="center-page">
  <div class="card" style="width: 100%; max-width: 380px;">
    <h2 class="form-title">Log in</h2>
    <p class="form-subtitle">Welcome back.</p>

    <div class="success-banner" id="success-banner"></div>
    <div class="error-banner" id="error-banner"></div>

    <form id="login-form">
      <label for="identifier">Username or email</label>
      <input type="text" id="identifier" required autocomplete="username" />

      <label for="password">Password</label>
      <input type="password" id="password" required autocomplete="current-password" />

      <button type="submit" class="primary" id="submit-btn">Log in</button>
    </form>

    <p class="form-footer">Don't have an account? <a href="register.html">Sign up</a></p>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
  // If already logged in, skip straight to the feed.
  if (isLoggedIn()) window.location.href = "feed.html";

  const params = new URLSearchParams(window.location.search);
  if (params.get("registered") === "1") {
    const banner = document.getElementById("success-banner");
    banner.textContent = "Account created. Log in to continue.";
    banner.classList.add("visible");
  }

  const form = document.getElementById("login-form");
  const errorBanner = document.getElementById("error-banner");
  const submitBtn = document.getElementById("submit-btn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorBanner.classList.remove("visible");
    submitBtn.disabled = true;
    submitBtn.textContent = "Logging in…";

    const identifier = document.getElementById("identifier").value.trim();
    const password = document.getElementById("password").value;

    try {
      const data = await apiRequest("/api/v1/auth/login", {
        method: "POST",
        form: { username: identifier, password },
        auth: false,
      });
      setSession(data.access_token);
      window.location.href = "feed.html";
    } catch (err) {
      errorBanner.textContent = err.message;
      errorBanner.classList.add("visible");
      submitBtn.disabled = false;
      submitBtn.textContent = "Log in";
    }
  });
</script>
</body>
</html>
