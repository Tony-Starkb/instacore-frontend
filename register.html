<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign up — InstaCore</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="nav-placeholder"></div>

<div class="center-page">
  <div class="card" style="width: 100%; max-width: 420px;">
    <h2 class="form-title">Create your account</h2>
    <p class="form-subtitle">Join InstaCore.</p>

    <div class="error-banner" id="error-banner"></div>

    <form id="register-form">
      <label for="username">Username</label>
      <input type="text" id="username" required autocomplete="username" />
      <p class="hint">5+ characters, letters/numbers, can include _ - $ @ # (not at start/end)</p>

      <label for="email">Email</label>
      <input type="email" id="email" required autocomplete="email" />

      <label for="password">Password</label>
      <input type="password" id="password" required autocomplete="new-password" />
      <p class="hint">8+ characters, at least one letter, one number, one of ! @ # $ % & *</p>

      <label for="full_name">Full name <span style="opacity:.6">(optional)</span></label>
      <input type="text" id="full_name" autocomplete="name" />

      <label for="bio">Bio <span style="opacity:.6">(optional)</span></label>
      <textarea id="bio" maxlength="150"></textarea>

      <button type="submit" class="primary" id="submit-btn">Sign up</button>
    </form>

    <p class="form-footer">Already have an account? <a href="login.html">Log in</a></p>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
  if (isLoggedIn()) window.location.href = "feed.html";

  const form = document.getElementById("register-form");
  const errorBanner = document.getElementById("error-banner");
  const submitBtn = document.getElementById("submit-btn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorBanner.classList.remove("visible");
    submitBtn.disabled = true;
    submitBtn.textContent = "Creating account…";

    const payload = {
      username: document.getElementById("username").value.trim(),
      email: document.getElementById("email").value.trim(),
      password: document.getElementById("password").value,
    };
    const fullName = document.getElementById("full_name").value.trim();
    const bio = document.getElementById("bio").value.trim();
    if (fullName) payload.full_name = fullName;
    if (bio) payload.bio = bio;

    try {
      await apiRequest("/api/v1/auth/registration", {
        method: "POST",
        json: payload,
        auth: false,
      });
      window.location.href = "login.html?registered=1";
    } catch (err) {
      errorBanner.textContent = err.message;
      errorBanner.classList.add("visible");
      submitBtn.disabled = false;
      submitBtn.textContent = "Sign up";
    }
  });
</script>
</body>
</html>
